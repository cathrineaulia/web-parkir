services:
  db:
    image: mysql:8.0
    container_name: mysql-db-cathrine
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: parkir
    volumes:
      - asat-vol:/var/lib/mysql
    networks:
      - asat-net
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web1:
    image: laravel-app:v1
    container_name: web1-cathrine
    command: >
      bash -c "chmod -R 777 /var/www/html/storage &&
               chmod -R 777 /var/www/html/bootstrap/cache &&
               chown -R www-data:www-data /var/www/html/storage &&
               service nginx start && php-fpm"
    restart: always
    ports:
      - "8081:80"
    environment:
      APP_ENV: production
      APP_KEY: base64:n8uqbZuUOnHr01RNbrn3DKOtYXGe0x9lDW/WaXw3WEg=
      APP_DEBUG: "false"
      APP_URL: http://192.168.0.10
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: parkir
      DB_USERNAME: root
      DB_PASSWORD: ""
      CACHE_DRIVER: file
      SESSION_DRIVER: file
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asat-net

  web2:
    image: laravel-app:v1
    container_name: web2-cathrine
    command: >
      bash -c "chmod -R 777 /var/www/html/storage &&
               chmod -R 777 /var/www/html/bootstrap/cache &&
               chown -R www-data:www-data /var/www/html/storage &&
               service nginx start && php-fpm"
    restart: always
    ports:
      - "8082:80"
    environment:
      APP_ENV: production
      APP_KEY: base64:n8uqbZuUOnHr01RNbrn3DKOtYXGe0x9lDW/WaXw3WEg=
      APP_DEBUG: "false"
      APP_URL: http://192.168.0.10
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: parkir
      DB_USERNAME: root
      DB_PASSWORD: ""
      CACHE_DRIVER: file
      SESSION_DRIVER: file
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asat-net

  web3:
    image: laravel-app:v1
    container_name: web3-cathrine
    command: >
      bash -c "chmod -R 777 /var/www/html/storage &&
               chmod -R 777 /var/www/html/bootstrap/cache &&
               chown -R www-data:www-data /var/www/html/storage &&
               service nginx start && php-fpm"
    restart: always
    ports:
      - "8083:80"
    environment:
      APP_ENV: production
      APP_KEY: base64:n8uqbZuUOnHr01RNbrn3DKOtYXGe0x9lDW/WaXw3WEg=
      APP_DEBUG: "false"
      APP_URL: http://192.168.0.10
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: parkir
      DB_USERNAME: root
      DB_PASSWORD: ""
      CACHE_DRIVER: file
      SESSION_DRIVER: file
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asat-net

volumes:
  asat-vol:

networks:
  asat-net:
    driver: bridge
